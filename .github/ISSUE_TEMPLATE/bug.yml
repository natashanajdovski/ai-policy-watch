name: Bug report
description: Something on the site or in a script is broken.
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Site UI, sync scripts, GitHub Actions — anything that isn't behaving.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      placeholder: Clicking "Reset" on the legislation filters does nothing.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open /legislation
        2. Check a box under Status
        3. Click Reset
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser / OS (for site bugs)
      placeholder: Chrome 131, macOS 15
  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot or console output (optional)
